name:  Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout Repository
        uses: actions/checkout@v3

      - name:  Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e

            echo " Connected to EC2"

            cd /var/www/lucentmr

            echo " Pulling latest code"
            git fetch origin
            git reset --hard origin/main

            echo " Backend Setup"
            cd backend
            npm install

            pm2 describe lucentmr-backend > /dev/null 2>&1 \
              && pm2 restart lucentmr-backend \
              || pm2 start index.js --name lucentmr-backend

            echo " Frontend Build"
            cd /var/www/lucentmr/website
            npm install
            rm -rf .next
            npm run build

            pm2 delete lucentmr-website 2>/dev/null || true
            pm2 start npm --name lucentmr-website -- start
            pm2 save

            echo " Reloading Nginx"
            sudo systemctl reload nginx

            echo "🎉 Deployment Successful!"
